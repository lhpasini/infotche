<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infotche - Tecnologia em Conectividade</title>
    <style>
        /* CSS RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #050510;
            color: #ffffff;
            overflow-x: hidden;
            /* CONFIGURAÇÃO DO FUNDO JPG */
            background-image: linear-gradient(rgba(5, 5, 16, 0.6), rgba(5, 5, 16, 0.6)), url('fundo.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
        }

        /* CABEÇALHO (HEADER) */
        header {
            background-color: rgba(5, 5, 16, 0.85);
            backdrop-filter: blur(10px); /* Efeito de vidro fosco */
            padding: 10px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #00f2fe;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.4);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }

        .logo-container {
            display: flex;
            align-items: center;
        }

        /* LOGO NAS DIMENSÕES 90x62 */
        .logo-image {
            width: 90px;
            height: 62px;
            display: block;
            object-fit: contain;
        }

        /* BOTÃO DE ORÇAMENTO */
        .btn-orcamento {
            background-color: transparent;
            color: #ffffff;
            border: 2px solid #4facfe;
            padding: 10px 22px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s all ease;
            box-shadow: 0 0 5px rgba(79, 172, 254, 0.4);
            text-transform: uppercase;
            font-size: 14px;
        }

        .btn-orcamento:hover {
            background-color: #4facfe;
            color: #050510;
            box-shadow: 0 0 20px rgba(79, 172, 254, 0.8);
            transform: translateY(-2px);
        }

        /* CONTEÚDO HERO (DESTAQUE) */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 5%;
        }

        .hero h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
            background: linear-gradient(to right, #ffffff, #00f2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .hero p {
            font-size: 1.2rem;
            max-width: 600px;
            line-height: 1.6;
            color: #ccc;
        }

        /* RESPONSIVIDADE PARA CELULAR */
        @media (max-width: 768px) {
            .hero h1 { font-size: 2.2rem; }
            .btn-orcamento { padding: 8px 15px; font-size: 12px; }
            .logo-image { width: 75px; height: 52px; } /* Reduz um pouco no mobile */
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="logo.png" alt="Infotche" class="logo-image">
        </div>
        <a href="https://wa.me/SEUNUMERO" target="_blank" class="btn-orcamento">Orçamento via WhatsApp</a>
    </header>

    <section class="hero">
        <h1>Conectividade sem limites.</h1>
        <p>A Infotche traz a evolução tecnológica para Santa Bárbara do Sul. Fibra óptica de ultravelocidade e suporte especializado para sua casa ou empresa.</p>
    </section>

</body>
</html>
