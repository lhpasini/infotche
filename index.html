<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infotche - Tecnologia em Conectividade</title>
    <style>
        /* RESET BÁSICO */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #050510;
            color: #ffffff;
            overflow-x: hidden;
            background-image: linear-gradient(rgba(5, 5, 16, 0.7), rgba(5, 5, 16, 0.7)), url('fundo.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
        }

        /* HEADER ESTRUTURADO */
        header {
            background-color: rgba(5, 5, 16, 0.9);
            backdrop-filter: blur(10px);
            padding: 10px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #00f2fe;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.4);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }

        /* ÁREA DO LOGO */
        .logo-container {
            flex: 1;
            display: flex;
            align-items: center;
        }

        .logo-image {
            width: 90px;
            height: 62px;
            display: block;
            object-fit: contain;
        }

        /* MENU CENTRAL */
        nav {
            flex: 3;
            display: flex;
            justify-content: center;
            gap: 25px;
        }

        nav a {
            color: #ffffff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        nav a:hover {
            color: #00f2fe;
            text-shadow: 0 0 10px #00f2fe;
        }

        /* ÍCONE DO WEBMAIL */
        .icon-mail {
            font-size: 18px;
            color: #00f2fe;
        }

        /* ÁREA DO BOTÃO */
        .cta-container {
            flex: 1;
            display: flex;
            justify-content: flex-end;
        }

        .btn-orcamento {
            background-color: transparent;
            color: #ffffff;
            border: 2px solid #4facfe;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 0 5px rgba(79, 172, 254, 0.4);
            font-size: 13px;
            white-space: nowrap;
        }

        .btn-orcamento:hover {
            background-color: #4facfe;
            color: #050510;
            box-shadow: 0 0 20px #4facfe;
        }

        /* CONTEÚDO HERO */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 5%;
        }

        .hero h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
            background: linear-gradient(to right, #ffffff, #00f2fe);
            /* CORREÇÃO DO VS CODE AQUI: */
            background-clip: text; 
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 1.2rem;
            max-width: 700px;
            color: #ccc;
            line-height: 1.6;
        }

        /* RESPONSIVIDADE */
        @media (max-width: 992px) {
            nav { display: none; }
            .hero h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="logo.png?v=4" alt="Infotche" class="logo-image">
        </div>

        <nav>
            <a href="#">Home</a>
            <a href="#">Serviços</a>
            <a href="#">Contato</a>
            <a href="/webmail"><span class="icon-mail">✉</span> Webmail</a>
        </nav>

        <div class="cta-container">
            <a href="https://wa.me/5555999999999" target="_blank" class="btn-orcamento">Orçamento WhatsApp</a>
        </div>
    </header>

    <section class="hero">
        <h1>Tecnologia que conecta.</h1>
        <p>A Infotche traz a ultravelocidade da fibra óptica para Santa Bárbara do Sul. Conectividade real para quem não pode parar.</p>
    </section>

</body>
</html>
