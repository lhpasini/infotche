<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webmail - Infotche</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body {
            background-color: #050510;
            background-image: linear-gradient(rgba(5, 5, 16, 0.7), rgba(5, 5, 16, 0.7)), url('../fundo.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .login-card {
            background: rgba(10, 10, 30, 0.9);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 10px;
            border: 1px solid #00f2fe;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        .logo-webmail {
            width: 90px;
            height: 62px;
            margin-bottom: 20px;
            object-fit: contain;
        }

        h2 { margin-bottom: 10px; font-weight: 300; color: #00f2fe; }
        
        p { margin-bottom: 30px; font-size: 14px; color: #ccc; line-height: 1.5; }

        .btn-entrar {
            display: block;
            width: 100%;
            padding: 14px;
            background: #00f2fe;
            border: none;
            border-radius: 5px;
            color: #050510;
            font-weight: bold;
            text-decoration: none;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-entrar:hover { 
            background: #4facfe; 
            box-shadow: 0 0 15px #00f2fe; 
            transform: translateY(-2px);
        }

        .footer-link { margin-top: 25px; font-size: 12px; color: #666; }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="../logo.png?v=4" alt="Infotche" class="logo-webmail">
        <h2>Webmail Corporativo</h2>
        <p>Acesse sua caixa postal através do nosso ambiente seguro.</p>
        
        <a href="https://mail.hostinger.com/" class="btn-entrar">Acessar Servidor</a>

        <div class="footer-link">
            <p>Infotche Conectividade © 2026</p>
        </div>
    </div>

</body>
</html>
